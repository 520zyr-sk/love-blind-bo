<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱盲盒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", sans-serif;
        }
        body {
            background-color: #f8f9fa;
            padding: 60px 20px;
            max-width: 750px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .header {
            text-align: center;
            margin-bottom: 80px;
        }
        .title {
            font-size: 56px;
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 15px;
        }
        .subtitle {
            font-size: 30px;
            color: #888;
        }
        .main-buttons {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .main-btn {
            display: block;
            height: 180px;
            border-radius: 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .main-btn:active {
            transform: scale(0.98);
        }
        .btn-icon {
            font-size: 70px;
            margin-bottom: 15px;
        }
        .btn-text {
            font-size: 36px;
            font-weight: bold;
            color: white;
        }
        .btn-pink {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .btn-blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="title">💌 恋爱盲盒</span>
            <span class="subtitle">遇见你的小确幸</span>
        </div>

        <div class="main-buttons">
            <!-- 按钮1：去投纸条 -->
            <a href="deposit.html" class="main-btn btn-pink">
                <div class="btn-icon">✉️</div>
                <span class="btn-text">我要投纸条</span>
            </a>
            <!-- 按钮2：去抽纸条 -->
            <a href="draw.html" class="main-btn btn-blue">
                <div class="btn-icon">🎁</div>
                <span class="btn-text">我要抽盲盒</span>
            </a>
        </div>
    </div>
</body>
</html>
